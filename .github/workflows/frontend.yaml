name: Frontend Release Watcher
env:
  DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
  DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
  DOCKERHUB_IMAGE_NAME: ${{ vars.FRONTEND_IMAGE_NAME }}  # image name on Docker Hub
  GITHUB_REPO: ${{ vars.FRONTEND_REPO }}    # repo to watch for releases
  BUILD_CONTEXT: ${{ vars.FRONTEND_BUILD_CONTEXT }}  # build context for Docker
  DOCKERFILE_PATH: ${{ vars.FRONTEND_DOCKERFILE_PATH }}  # path to Dockerfile
on:
  schedule:
    - cron: '0 0 * * *'   
  workflow_dispatch:      # allow manual runs

jobs:
  watch-release:
    runs-on: ubuntu-22.04-arm
    steps:
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ env.DOCKERHUB_USERNAME }}
          password: ${{ env.DOCKERHUB_TOKEN }}

      - name: Extract metadata (tags)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.DOCKERHUB_USERNAME }}/${{ env.DOCKERHUB_IMAGE_NAME }}
      - name: Check if latest release tag exists in Docker Hub
        id: check-release
        run: |
          repo=${{ env.GITHUB_REPO }}
          latest_tag=$(curl -s "https://api.github.com/repos/${{ env.GITHUB_REPO }}/tags" | \
            jq -r '.[0].name')
          echo "latest=$latest_tag" >> "$GITHUB_OUTPUT"
          if [ grep -q "${{ env.DOCKERHUB_IMAGE_NAME }}:$latest_tag" <<< "${{ steps.meta.outputs.tags }}" ]; then
            echo "Tag already exists in metadata output, skipping build and push."
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "Tag does not exist in metadata output, proceeding with build and push."
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi
      - name: Checkout
        uses: actions/checkout@v4
        if: steps.check-release.outputs.exists != 'true'
        with:
            repository: ${{ env.GITHUB_REPO }}
            ref: ${{ steps.check-release.outputs.latest }}
      - name: Set up Docker Buildx
        if: steps.check-release.outputs.exists != 'true'
        uses: docker/setup-buildx-action@v3
      - name: Build and push ARM64 image
        if: steps.check-release.outputs.exists != 'true'
        uses: docker/build-push-action@v6
        with:
          context: ${{ env.BUILD_CONTEXT }}
          file: ${{ env.DOCKERFILE_PATH }}
          platforms: linux/arm64
          push: true
          tags: ${{ env.DOCKERHUB_USERNAME }}/${{ env.DOCKERHUB_IMAGE_NAME }}:${{ steps.check-release.outputs.latest }}